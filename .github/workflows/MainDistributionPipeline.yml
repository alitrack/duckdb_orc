name: Main Extension Distribution Pipeline
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: orc
      extra_toolchains: rust;python3
      exclude_archs: 'linux_amd64_musl;windows_amd64_mingw'

  release:
    name: Create GitHub Release
    needs: duckdb-stable-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename release assets with platform suffix
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          for artifact_dir in artifacts/*; do
            [ -d "$artifact_dir" ] || continue
            artifact_name=$(basename "$artifact_dir")
            platform_suffix="${artifact_name##*-extension-}"

            for asset in "$artifact_dir"/*.duckdb_extension "$artifact_dir"/*.duckdb_extension.wasm; do
              [ -f "$asset" ] || continue
              asset_name=$(basename "$asset")

              if [[ "$asset_name" == *.duckdb_extension.wasm ]]; then
                extension_suffix=".duckdb_extension.wasm"
                stem="${asset_name%.duckdb_extension.wasm}"
              else
                extension_suffix=".duckdb_extension"
                stem="${asset_name%.duckdb_extension}"
              fi

              cp "$asset" "release-assets/${stem}-${platform_suffix}${extension_suffix}"
            done
          done

          test -n "$(find release-assets -type f | head -1)"
          find release-assets -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
