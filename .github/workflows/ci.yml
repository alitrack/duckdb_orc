name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Strip
        run: strip target/release/libduckdb_orc.so

      - name: Create extension
        run: make release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orc-duckdb-extension-linux-amd64
          path: build/release/extension/orc/orc.duckdb_extension
